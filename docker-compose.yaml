name: uno-not-uno
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    env_file:
      - ./.env

  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./conf:/etc/caddy
      - ./site:/srv
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
      