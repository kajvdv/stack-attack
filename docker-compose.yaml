name: uno-not-uno
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    env_file:
      - ./.env

  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - backend
      